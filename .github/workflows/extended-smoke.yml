name: Extended Smoke

on:
  workflow_dispatch:

concurrency:
  group: extended-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extended-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Assert strict-fail fixtures are rejected
        run: |
          set -euo pipefail
          fixtures=(
            examples/web_qa_playwright_strict_fail_duplicate_checkpoint.md
            examples/web_qa_playwright_strict_fail_missing_evidence.md
            examples/web_qa_playwright_strict_fail_missing_classification.md
            examples/web_qa_playwright_strict_fail_missing_execution_log_header.md
          )
          for fixture in "${fixtures[@]}"; do
            if python3 scripts/validate_web_qa_report.py --file "$fixture" --strict; then
              echo "expected strict validation to fail for fixture: $fixture" >&2
              exit 1
            fi
          done

          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_malformed_failure_breakdown.md \
            --strict \
            --require-failure-classification-summary; then
            echo "expected malformed failure-breakdown fixture to fail when summary gate is enabled" >&2
            exit 1
          fi

      - name: Assert strict-plus profile fixtures (pass + fail)
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --strict-plus

          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_combined_fail.md \
            --strict-plus; then
            echo "expected strict-plus validation to fail for combined failure fixture" >&2
            exit 1
          fi

      - name: Assert replay profile aliases stay equivalent
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --deterministic-replay-profile
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --playwright-interactive-profile
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --strict-replay-profile
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --ci-replay-profile

      - name: Assert strict-plus JSON payload shape for downstream CI parsers
        run: |
          set -euo pipefail
          mkdir -p .tmp
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --strict-plus \
            --json-out .tmp/web-qa-validation.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-validation.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'PASS'
          assert payload['strict'] is True
          assert payload['strict_plus'] is True
          assert payload['require_checkpoint_timestamps'] is True
          assert payload['require_failure_recovery_plan'] is True
          assert payload['require_qa_inventory_section'] is True
          counts = payload['counts']
          assert counts == {'functional': 5, 'visual': 3, 'off_happy': 2}
          print('strict-plus JSON payload shape: PASS')
          PY

      - name: Assert QA inventory check-ref smoke directions
        run: |
          set -euo pipefail
          mkdir -p .tmp
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_with_check_refs_pass.md \
            --strict-plus \
            --require-qa-inventory-check-refs \
            --json-out .tmp/web-qa-check-refs-side-by-side-pass.json
          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_missing_check_refs_only.md \
            --strict-plus \
            --require-qa-inventory-check-refs \
            --json-out .tmp/web-qa-check-refs-side-by-side-fail.json; then
            echo "expected isolated missing-check-refs fixture to fail in paired smoke step" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          passed = json.loads(Path('.tmp/web-qa-check-refs-side-by-side-pass.json').read_text(encoding='utf-8'))
          failed = json.loads(Path('.tmp/web-qa-check-refs-side-by-side-fail.json').read_text(encoding='utf-8'))
          assert passed['status'] == 'PASS'
          assert failed['status'] == 'FAIL'
          assert passed['report_metadata']['qa_inventory_check_ref_count'] == 10
          assert failed['report_metadata']['qa_inventory_check_ref_count'] == 0
          print('paired QA inventory smoke commands: PASS')
          PY

      - name: Run replay-profile smoke script
        run: |
          chmod +x scripts/smoke_replay_profile_examples.sh
          ./scripts/smoke_replay_profile_examples.sh
