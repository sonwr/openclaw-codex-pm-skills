name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          test -f README.md
          test -f docs/INSTALL_OPENCLAW.md
          test -f docs/COMPATIBILITY.md
      - name: Check skill files
        run: |
          find skills -name 'SKILL.md' | grep -q .
      - name: Check helper scripts
        run: |
          test -x scripts/install_local.sh
          test -x scripts/validate_web_qa_report.py
      - name: Validate sample web QA report shape
        run: |
          python3 scripts/validate_web_qa_report.py --file examples/web_qa_playwright_sample_run.md --strict
      - name: Run validator unit tests
        run: |
          PYTHONPATH=. python3 -m unittest discover -s tests -p "test_*.py" -v
      - name: Assert strict-fail fixtures are rejected
        run: |
          set -euo pipefail
          fixtures=(
            examples/web_qa_playwright_strict_fail_duplicate_checkpoint.md
            examples/web_qa_playwright_strict_fail_missing_evidence.md
            examples/web_qa_playwright_strict_fail_missing_classification.md
            examples/web_qa_playwright_strict_fail_missing_execution_log_header.md
          )
          for fixture in "${fixtures[@]}"; do
            if python3 scripts/validate_web_qa_report.py --file "$fixture" --strict; then
              echo "expected strict validation to fail for fixture: $fixture" >&2
              exit 1
            fi
          done

          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_malformed_failure_breakdown.md \
            --strict \
            --require-failure-classification-summary; then
            echo "expected malformed failure-breakdown fixture to fail when summary gate is enabled" >&2
            exit 1
          fi

      - name: Assert strict-plus profile fixtures (pass + fail)
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --strict-plus

          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_combined_fail.md \
            --strict-plus; then
            echo "expected strict-plus validation to fail for combined failure fixture" >&2
            exit 1
          fi

      - name: Assert deterministic replay profile alias stays equivalent
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --deterministic-replay-profile

      - name: Assert Playwright interactive profile preset stays equivalent
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --playwright-interactive-profile

      - name: Assert strict replay profile alias stays equivalent
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --strict-replay-profile

      - name: Assert CI replay profile alias stays equivalent
        run: |
          set -euo pipefail
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --ci-replay-profile

      - name: Assert strict-plus JSON payload shape for downstream CI parsers
        run: |
          set -euo pipefail
          mkdir -p .tmp
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_pass.md \
            --strict-plus \
            --json-out .tmp/web-qa-validation.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-validation.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'PASS'
          assert payload['strict'] is True
          assert payload['strict_plus'] is True
          assert payload['require_checkpoint_timestamps'] is True
          assert payload['require_failure_recovery_plan'] is True
          assert payload['require_qa_inventory_section'] is True
          counts = payload['counts']
          assert counts == {'functional': 5, 'visual': 3, 'off_happy': 2}
          print('strict-plus JSON payload shape: PASS')
          PY

      - name: Assert QA inventory check-ref profile emits parser-friendly PASS metadata
        run: |
          set -euo pipefail
          mkdir -p .tmp
          python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_plus_with_check_refs_pass.md \
            --strict-plus \
            --require-qa-inventory-check-refs \
            --json-out .tmp/web-qa-check-refs-pass.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-check-refs-pass.json').read_text(encoding='utf-8'))
          metadata = payload['report_metadata']
          assert payload['status'] == 'PASS'
          assert payload['require_qa_inventory_check_refs'] is True
          assert metadata['qa_inventory_check_ref_count'] == 10
          assert metadata['qa_inventory_check_refs'] == ['F1', 'F2', 'F3', 'F4', 'F5', 'V1', 'V2', 'V3', 'O1', 'O2']
          assert metadata['next_action_failed_check_ref_count'] == 0
          print('QA inventory check-ref PASS metadata: PASS')
          PY

      - name: Assert isolated missing-check-refs fixture fails with exactly one parser-facing error
        run: |
          set -euo pipefail
          mkdir -p .tmp
          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_missing_check_refs_only.md \
            --strict-plus \
            --require-qa-inventory-check-refs \
            --json-out .tmp/web-qa-missing-check-refs.json; then
            echo "expected isolated missing-check-refs fixture to fail strict-plus validation" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-missing-check-refs.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'FAIL'
          assert payload['error_count'] == 1
          assert len(payload['errors']) == 1
          assert 'qa inventory check refs' in payload['errors'][0]
          assert 'Checks:' in payload['errors'][0]
          print('QA inventory check-ref FAIL metadata: PASS')
          PY

      - name: Assert isolated monotonic-timestamp fixture fails with exactly one parser-facing error
        run: |
          set -euo pipefail
          mkdir -p .tmp
          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_monotonic_timestamp_only.md \
            --strict-plus \
            --json-out .tmp/web-qa-monotonic-only.json; then
            echo "expected isolated monotonic-timestamp fixture to fail strict-plus validation" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-monotonic-only.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'FAIL'
          assert payload['error_count'] == 1
          assert len(payload['errors']) == 1
          assert 'checkpoint timestamp order' in payload['errors'][0]
          print('isolated monotonic timestamp JSON payload: PASS')
          PY

      - name: Assert isolated artifact-ref reuse fixture fails with exactly one parser-facing error
        run: |
          set -euo pipefail
          mkdir -p .tmp
          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_artifact_ref_reuse_only.md \
            --strict-plus \
            --json-out .tmp/web-qa-artifact-ref-reuse.json; then
            echo "expected isolated artifact-ref reuse fixture to fail strict-plus validation" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-artifact-ref-reuse.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'FAIL'
          assert payload['error_count'] == 1
          assert len(payload['errors']) == 1
          assert 'checkpoint artifact ref uniqueness' in payload['errors'][0]
          print('isolated artifact-ref reuse JSON payload: PASS')
          PY

      - name: Assert isolated status-consistency fixture fails with exactly one parser-facing error
        run: |
          set -euo pipefail
          mkdir -p .tmp
          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_status_inconsistency_only.md \
            --strict-plus \
            --json-out .tmp/web-qa-status-inconsistency.json; then
            echo "expected isolated status-consistency fixture to fail strict-plus validation" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-status-inconsistency.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'FAIL'
          assert payload['error_count'] == 1
          assert len(payload['errors']) == 1
          assert 'status consistency' in payload['errors'][0]
          print('isolated status consistency JSON payload: PASS')
          PY

      - name: Assert isolated missing-artifact-path fixture fails with exactly one parser-facing error
        run: |
          set -euo pipefail
          mkdir -p .tmp
          if python3 scripts/validate_web_qa_report.py \
            --file examples/web_qa_playwright_strict_fail_missing_artifact_paths_only.md \
            --strict-plus \
            --json-out .tmp/web-qa-missing-artifact-paths.json; then
            echo "expected isolated missing-artifact-path fixture to fail strict-plus validation" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('.tmp/web-qa-missing-artifact-paths.json').read_text(encoding='utf-8'))
          assert payload['status'] == 'FAIL'
          assert payload['error_count'] == 1
          assert len(payload['errors']) == 1
          assert 'checkpoint artifact paths' in payload['errors'][0]
          print('isolated missing artifact paths JSON payload: PASS')
          PY
