name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs exist
        run: |
          test -f README.md
          test -f docs/INSTALL_OPENCLAW.md
          test -f docs/COMPATIBILITY.md
      - name: Check skill files
        run: |
          find skills -name 'SKILL.md' | grep -q .
